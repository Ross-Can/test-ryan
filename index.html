<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blurc3Me</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff}
header{padding:20px;background:#000;display:flex;justify-content:center}


.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:radial-gradient(circle at center,#181818,#050505);
}
.hero h1{font-size:5rem;letter-spacing:6px}
.hero p{color:#bbb;margin:20px 0}
.btn{
display:inline-block;
padding:14px 30px;
background:#c40021;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.collections{
padding:100px 8%;
}
.collections h2{
text-align:center;
font-size:4rem;
letter-spacing:8px;
margin-bottom:50px;
}

.featured-drop{
height:500px;
border-radius:20px;
background:linear-gradient(145deg,#111,#1b1b1b);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin-bottom:30px;
border:1px solid #222;
}

.featured-drop img{width:120px;margin-bottom:20px;animation:spin 8s linear infinite}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:24px;
}

.card{
height:300px;
background:linear-gradient(145deg,#111,#1a1a1a);
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-8px);
border-color:#ff0000;
box-shadow:0 0 30px rgba(255,0,0,.35);
}

.card h3{
font-size:2rem;
margin-bottom:15px;
}

footer{
padding:50px;
text-align:center;
color:#777;
}
</style>
</head>
<body>


<section class="hero">
<img src="IMG_1621.GIF" class="logo">
<h1>BLUDR3M</h1>
<p>Streetwear • Motion • Culture</p>
<a class="btn" href="#">Sign Up for Drop Alert</a>
</section>


<footer>© 2026 BLURC3ME</footer>

</body>
</html>
